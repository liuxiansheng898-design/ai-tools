<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微信/支付宝收款码生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-green-600 to-emerald-800 min-h-screen p-4">
  <div class="max-w-md mx-auto">
    <header class="text-center mb-6">
      <h1 class="text-3xl font-bold text-white">💰 收款码生成器</h1>
      <p class="text-white/80">微信/支付宝收款码</p>
    </header>

    <div class="bg-white rounded-2xl p-6 shadow-xl">
      <div class="mb-4">
        <label class="block font-bold mb-2">💳 方式</label>
        <select id="type" onchange="update()" class="w-full border rounded-lg px-4 py-3">
          <option value="wechat">💚 微信收款码</option>
          <option value="alipay">💙 支付宝收款码</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block font-bold mb-2">📱 收款账号</label>
        <input id="account" type="text" placeholder="请输入账号" class="w-full border rounded-lg px-4 py-3">
      </div>

      <div class="mb-4">
        <label class="block font-bold mb-2">💵 金额（可选）</label>
        <input id="amount" type="number" placeholder="不填则手动输入金额" class="w-full border rounded-lg px-4 py-3">
      </div>

      <div class="mb-4">
        <label class="block font-bold mb-2">📝 备注（可选）</label>
        <input id="note" type="text" placeholder="例如：付费咨询" class="w-full border rounded-lg px-4 py-3">
      </div>

      <button onclick="generate()" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl">
        🔗 生成收款链接
      </button>

      <div id="result" class="mt-6 hidden">
        <div class="text-center">
          <div id="qrcode" class="flex justify-center mb-4"></div>
          <p id="linkText" class="text-sm text-gray-500 break-all mb-4"></p>
          <button onclick="copyLink()" class="bg-blue-500 text-white px-6 py-2 rounded-lg">📋 复制链接</button>
        </div>
      </div>
    </div>

    <footer class="text-center text-white mt-6 text-sm">
      <p>⚠️ 仅生成收款链接，需保存图片后扫码付款</p>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script>
    function update() {
      const type = document.getElementById('type').value;
      const account = document.getElementById('account').value;
      const placeholder = type === 'wechat' ? '微信号' : '支付宝账号';
      document.getElementById('account').placeholder = placeholder;
    }

    function generate() {
      const type = document.getElementById('type').value;
      const account = document.getElementById('account').value;
      const amount = document.getElementById('amount').value;
      const note = document.getElementById('note').value;

      if (!account) {
        alert('请输入收款账号！');
        return;
      }

      let url = '';
      if (type === 'wechat') {
        url = `wxp://${account}`;
        if (amount) url += `?amount=${amount}`;
      } else {
        url = `https://qr.alipay.com/${account}`;
        if (amount) url += `?x=${amount}`;
      }

      document.getElementById('linkText').textContent = url;
      
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';
      QRCode.toCanvas(url, { width: 200 }, (err, canvas) => {
        if (!err) qrContainer.appendChild(canvas);
      });

      document.getElementById('result').classList.remove('hidden');
    }

    function copyLink() {
      navigator.clipboard.writeText(document.getElementById('linkText').textContent);
      alert('已复制！');
    }
  </script>
</body>
</html>
