<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>算命八字分析 - AI命理大师</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-black min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    <header class="text-center mb-6">
      <h1 class="text-3xl font-bold text-white mb-2">🔮 AI命理大师</h1>
      <p class="text-white/70">八字分析 | 运势预测 | 入门指导</p>
    </header>

    <div class="bg-white/10 backdrop-blur rounded-2xl p-6 border border-white/20 text-white">
      <div class="mb-4">
        <label class="block mb-2">🎂 出生年份</label>
        <select id="year" class="w-full bg-white/20 rounded-lg px-4 py-3"></select>
      </div>

      <div class="mb-4">
        <label class="block mb-2">🗓️ 出生月份</label>
        <select id="month" class="w-full bg-white/20 rounded-lg px-4 py-3">
          <option value="1">正月</option><option value="2">二月</option><option value="3">三月</option>
          <option value="4">四月</option><option value="5">五月</option><option value="6">六月</option>
          <option value="7">七月</option><option value="8">八月</option><option value="9">九月</option>
          <option value="10">十月</option><option value="11">冬月</option><option value="12">腊月</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block mb-2">📅 出生日期</label>
        <select id="day" class="w-full bg-white/20 rounded-lg px-4 py-3"></select>
      </div>

      <div class="mb-4">
        <label class="block mb-2">⏰ 出生时辰</label>
        <select id="hour" class="w-full bg-white/20 rounded-lg px-4 py-3">
          <option value="子">子时 (23:00-01:00)</option>
          <option value="丑">丑时 (01:00-03:00)</option>
          <option value="寅">寅时 (03:00-05:00)</option>
          <option value="卯">卯时 (05:00-07:00)</option>
          <option value="辰">辰时 (07:00-09:00)</option>
          <option value="巳">巳时 (09:00-11:00)</option>
          <option value="午">午时 (11:00-13:00)</option>
          <option value="未">未时 (13:00-15:00)</option>
          <option value="申">申时 (15:00-17:00)</option>
          <option value="酉">酉时 (17:00-19:00)</option>
          <option value="戌">戌时 (19:00-21:00)</option>
          <option value="亥">亥时 (21:00-23:00)</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block mb-2">👤 性别</label>
        <select id="gender" class="w-full bg-white/20 rounded-lg px-4 py-3">
          <option value="男">♂️ 男性</option>
          <option value="女">♀️ 女性</option>
        </select>
      </div>

      <button onclick="analyze()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 py-4 rounded-xl font-bold">
        🔮 开始分析
      </button>

      <div id="result" class="mt-6 p-4 bg-white/10 rounded-xl hidden">
        <h3 class="font-bold text-xl mb-4">📊 八字分析结果</h3>
        <div id="analysis" class="text-sm space-y-3"></div>
      </div>
    </div>

    <footer class="text-center text-white/50 mt-6">
      <p>⚠️ 仅供娱乐参考 | Made by 铁牛 🐂</p>
    </footer>
  </div>

  <script>
    // 初始化年份
    const yearSelect = document.getElementById('year');
    for (let y = 1960; y <= 2025; y++) {
      yearSelect.innerHTML += `<option value="${y}">${y}年</option>`;
    }

    // 初始化日期
    const daySelect = document.getElementById('day');
    for (let d = 1; d <= 30; d++) {
      daySelect.innerHTML += `<option value="${d}">${d}日</option>`;
    }

    const tiangan = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const dizhi = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    const wuxing = ['木', '火', '土', '金', '水'];

    function getTiangan(index) { return tiangan[index % 10]; }
    function getDizhi(index) { return dizhi[index % 12]; }

    function getWuxing(gan) {
      const map = { '甲': '木', '乙': '木', '丙': '火', '丁': '火', '戊': '土', '己': '土', '庚': '金', '辛': '金', '壬': '水', '癸': '水' };
      return map[gan];
    }

    function analyze() {
      const year = parseInt(document.getElementById('year').value);
      const month = parseInt(document.getElementById('month').value);
      const day = parseInt(document.getElementById('day').value);
      const hour = document.getElementById('hour').value;
      const gender = document.getElementById('gender').value;

      // 简化计算（仅供演示）
      const yearIdx = year - 1900;
      const monthIdx = month + yearIdx;
      const dayIdx = day + monthIdx;
      const hourIdx = dizhi.indexOf(hour);

      const nian = getTiangan(yearIdx) + getDizhi(yearIdx);
      const yue = getTiangan(monthIdx) + getDizhi(monthIdx);
      const ri = getTiangan(dayIdx) + getDizhi(dayIdx);
      const shi = getTiangan(hourIdx + dayIdx) + hour;

      const nianZhu = getWuxing(nian[0]);
      const yueZhu = getWuxing(yue[0]);
      const riZhu = getWuxing(ri[0]);
      const shiZhu = getWuxing(shi[0]);

      const wuxingList = [nianZhu, yueZhu, riZhu, shiZhu];
      const wood = wuxingList.filter(x => x === '木').length;
      const fire = wuxingList.filter(x => x === '火').length;
      const earth = wuxingList.filter(x => x === '土').length;
      const metal = wuxingList.filter(x => x === '金').length;
      const water = wuxingList.filter(x => x === '水').length;

      let conclusion = '';
      if (wood > fire && wood > earth && wood > metal && wood > water) conclusion = '木旺';
      else if (fire > wood && fire > earth && fire > metal && fire > water) conclusion = '火旺';
      else if (earth > wood && earth > fire && earth > metal && earth > water) conclusion = '土旺';
      else if (metal > wood && metal > fire && metal > earth && metal > water) conclusion = '金旺';
      else conclusion = '水旺';

      const analysis = `
<div class="bg-white/5 p-3 rounded-lg">
  <p><strong>🗓️ 八字：</strong>${nian} ${yue} ${ri} ${shi}</p>
</div>
<div class="bg-white/5 p-3 rounded-lg mt-2">
  <p><strong>🔥 五行分布：</strong></p>
  <p>木:${wood} 火:${fire} 土:${earth} 金:${metal} 水:${water}</p>
</div>
<div class="bg-white/5 p-3 rounded-lg mt-2">
  <p><strong>💪 命局：</strong>${conclusion}格</p>
</div>
<div class="bg-white/5 p-3 rounded-lg mt-2">
  <p><strong>👤 性格特点：</strong>${gender === '男' ? '具有责任感，注重事业，有领导才能' : '温柔细腻，富有同情心，善于照顾他人'}</p>
</div>
<div class="bg-white/5 p-3 rounded-lg mt-2">
  <p><strong>💰 事业财运：</strong>中年运势较好，适合稳定发展</p>
</div>
<div class="bg-white/5 p-3 rounded-lg mt-2">
  <p><strong>❤️ 感情运势：</strong>${gender === '男' ? '适合温柔顾家的对象' : '需要有安全感的伴侣'}</p>
</div>
      `;

      document.getElementById('analysis').innerHTML = analysis;
      document.getElementById('result').classList.remove('hidden');
    }
  </script>
</body>
</html>
