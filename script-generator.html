<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>短视频脚本神器 - 30秒产出爆款脚本</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-pink-500 via-red-500 to-yellow-500 min-h-screen p-4">
  <div class="max-w-2xl mx-auto">
    <header class="text-center mb-6">
      <h1 class="text-3xl font-bold text-white mb-2">📱 短视频脚本神器</h1>
      <p class="text-white/80">30秒产出爆款脚本</p>
    </header>

    <div class="bg-white rounded-2xl p-6 shadow-xl">
      <div class="mb-4">
        <label class="block font-bold mb-2">🎯 视频主题</label>
        <input id="topic" type="text" placeholder="例如：职场干货、情感故事、美食推荐..." class="w-full border rounded-lg px-4 py-3">
      </div>

      <div class="mb-4">
        <label class="block font-bold mb-2">📝 视频类型</label>
        <select id="type" class="w-full border rounded-lg px-4 py-3">
          <option value="干货">💡 干货教程</option>
          <option value="情感">❤️ 情感故事</option>
          <option value="搞笑">😂 搞笑剧情</option>
          <option value="美食">🍜 美食推荐</option>
          <option value="种草">🛍️ 好物种草</option>
          <option value="剧情">🎬 短剧剧情</option>
        </select>
      </div>

      <div class="mb-4">
        <label class="block font-bold mb-2">⏱️ 时长</label>
        <select id="duration" class="w-full border rounded-lg px-4 py-3">
          <option value="15">15秒</option>
          <option value="30">30秒</option>
          <option value="60">60秒</option>
        </select>
      </div>

      <button onclick="generate()" class="w-full bg-gradient-to-r from-pink-500 to-red-500 text-white font-bold py-4 rounded-xl">
        🚀 一键生成脚本
      </button>

      <div id="result" class="mt-6 hidden">
        <div class="bg-gray-50 rounded-xl p-4">
          <h3 class="font-bold mb-2">📝 生成的脚本：</h3>
          <div id="script" class="whitespace-pre-wrap text-sm"></div>
        </div>
        <button onclick="copy()" class="mt-4 bg-green-500 text-white px-6 py-2 rounded-lg">📋 复制脚本</button>
      </div>
    </div>

    <footer class="text-center text-white mt-6">
      <p>Made by 铁牛 🐂</p>
    </footer>
  </div>

  <script>
    const templates = {
      干货: (t, d) => `【${t}】

[开头3秒 - 钩子]
"3个 ${t} 的技巧，第3个最重要！"

[中间${d>30?'20':'12'}秒 - 干货]
1. ${t}技巧一：核心要点
2. ${t}技巧二：实用方法  
3. ${t}技巧三：关键提醒

[结尾3秒 - 引导]
"关注我，获取更多${t}干货！"

#${t} #干货 #知识`,
      情感: (t, d) => `【${t}情感故事】

[开头3秒]
"那天，我终于明白了..."

[中间${d>30?'20':'12'}秒]
讲述关于${t}的情感故事
- 情节1：背景
- 情节2：冲突
- 情节3：转折

[结尾3秒]
"你有过类似经历吗？评论区聊聊"

#情感 #${t} #故事`,
      搞笑: (t, d) => `【${t}搞笑剧情】

[开头3秒]
"千万别让你老公/老婆看到这个！"

[中间${d>30?'20':'12'}秒]
- 场景1：${t}相关日常
- 场景2：反转剧情
- 场景3：意外结局

[结尾3秒]
"点赞关注，下期更搞笑！"

#搞笑 #${t} #段子`,
      美食: (t, d) => `【${t}美食推荐】

[开头3秒]
"这道${t}，太好吃了！"

[中间${d>30?'20':'12'}秒]
- 食材准备
- 制作步骤
- 口味特点

[结尾3秒]
"学会了就做给家人吃吧！"

#美食 #${t} #教程`,
      种草: (t, d) => `【${t}好物推荐】

[开头3秒]
"这个${t}，我用了3个月真的爱了！"

[中间${d>30?'20':'12'}秒]
- 优点1：核心卖点
- 优点2：使用体验
- 优点3：性价比

[结尾3秒]
"同款链接在评论区，快去试试！"

#好物 #${t} #种草`,
      剧情: (t, d) => `【${t}短剧】

[开头3秒]
"如果${t}，你会怎么做？"

[中间${d>30?'20':'12'}秒]
- 场景1：${t}开始
- 场景2：冲突发生
- 场景3：高潮反转

[结尾3秒]
"下期更新，点关注不迷路！"

#短剧 #${t} #剧情`
    };

    function generate() {
      const topic = document.getElementById('topic').value || '通用';
      const type = document.getElementById('type').value;
      const duration = parseInt(document.getElementById('duration').value);
      
      const script = templates[type](topic, duration);
      document.getElementById('script').textContent = script;
      document.getElementById('result').classList.remove('hidden');
    }

    function copy() {
      navigator.clipboard.writeText(document.getElementById('script').textContent);
      alert('已复制！');
    }
  </script>
</body>
</html>
